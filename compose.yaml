services:
  searxng:
    image: searxng/searxng:latest
    container_name: lobster-searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    restart: unless-stopped

  lobster-bot:
    build: .
    working_dir: /app
    volumes:
      - ./bot.py:/app/bot.py:ro
      - ./memory.py:/app/memory.py:ro
      - ./tools_registry.py:/app/tools_registry.py:ro
      - ./tool_calling_loop.py:/app/tool_calling_loop.py:ro
      - ./tools:/app/tools:ro
      - ./stats.json:/app/stats.json
      - ./auth:/app/auth
      - lobster-memory:/app/data/memory
      - /var/run/docker.sock:/var/run/docker.sock  # Docker 命令支持
      - ./:/app/lobster-src:ro                      # 源码只读访问
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - searxng
    restart: unless-stopped

volumes:
  lobster-memory:
