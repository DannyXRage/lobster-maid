services:
  lobster-bot:
    build: .
    working_dir: /app
    volumes:
      - ./bot.py:/app/bot.py:ro
      - ./memory.py:/app/memory.py:ro
      - ./tools_registry.py:/app/tools_registry.py:ro
      - ./tool_calling_loop.py:/app/tool_calling_loop.py:ro
      - ./tools:/app/tools:ro
      - ./stats.json:/app/stats.json
      - lobster-memory:/app/data/memory
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  lobster-memory:
