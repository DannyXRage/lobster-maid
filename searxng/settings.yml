use_default_settings:
  engines:
    keep_only:
      - google
      - bing
      - duckduckgo
      - brave
      - mojeek
      - yahoo
      - yandex
      - sogou
      - wikipedia
      - github

general:
  instance_name: "Lobster Search"
  debug: false

search:
  safe_search: 0
  formats:
    - html
    - json
  default_lang: "auto"

server:
  secret_key: "lobster-searxng-2026"
  bind_address: "0.0.0.0"
  port: 8080
  image_proxy: false

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false  # 保留！403 时 SearXNG 自动忽略，恢复后自动生效
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false
  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false
  - name: yandex
    engine: yandex
    shortcut: yd
    disabled: false
  - name: sogou
    engine: sogou
    shortcut: sg
    disabled: false
    timeout: 6
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
  - name: github
    engine: github
    shortcut: gh
    disabled: false
